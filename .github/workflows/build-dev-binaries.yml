on:
  workflow_call:

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  riscv-build:
    name: "linux riscv64"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Install Rust toolchain"
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add --toolchain stable riscv64gc-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: sudo apt-get update && sudo apt-get install build-essential lld gcc-riscv64-linux-gnu g++-riscv64-linux-gnu
      - run: cp -f .cargo/config.toml.cross-riscv .cargo/config.toml
      - run: cargo +stable build --target riscv64gc-unknown-linux-gnu

  loongarch64-build:
    name: "linux loongarch64"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: ubuntu:25.10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: apt-get update && apt-get install -y build-essential lld gcc gcc-loongarch64-linux-gnu g++-loongarch64-linux-gnu curl
      - name: "Install Rustup"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: "Install Rust toolchain"
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add --toolchain stable loongarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cp -f .cargo/config.toml.cross-loongarch64 .cargo/config.toml
      - run: cargo +stable build --target loongarch64-unknown-linux-gnu

  wasip1-build:
    name: "wasip1"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: ubuntu:25.10
    steps:
      - name: Install xz-utils
        run: apt-get update && apt-get install -y xz-utils
      - name: Setup Wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
        with:
          version: '43.0.0'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: apt-get install --update -y build-essential gcc gcc-multilib clang curl
      - name: "Install Rustup"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: "Install Rust toolchain"
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add --toolchain stable wasm32-wasip1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo +stable build --target wasm32-wasip1
      - run: cp -f .cargo/config.toml.cross-wasm32p1 .cargo/config.toml
      # -p libsld prevents integration tests from running. they depend on
      # spawning processes, which isn't supported on wasi.
      - run: cargo +stable test --profile ci -p libsld --target wasm32-wasip1

  windows-build:
    name: "windows x86_64"
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Install Rust toolchain"
        run: rustup toolchain install stable --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo +stable build --profile ci --workspace --no-default-features
