name: Workload tests

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      runner:
        required: true
        type: string
      target:
        required: true
        type: string
      sha:
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: ${{ matrix.name }} (${{ inputs.name }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: uv
            repository: astral-sh/uv
            packages: -p uv
          - name: Ruff and ty
            repository: astral-sh/ruff
            packages: -p ruff -p ty
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PACKAGES: ${{ matrix.packages }}
      SRS_CI_TARGET: ${{ inputs.target }}
    steps:
      - name: Download installed SRS snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: srs-toolchain-${{ inputs.target }}-${{ inputs.sha }}
          path: ${{ runner.temp }}/srs-artifact

      - name: Link installed SRS snapshot
        run: |
          release_name="srs-ci-$SRS_CI_TARGET"
          install_root="$RUNNER_TEMP/srs-toolchains"
          mkdir -p "$install_root"
          tar -C "$install_root" \
            -xzf "$RUNNER_TEMP/srs-artifact/$release_name.tar.gz"
          rustup toolchain link srs "$install_root/$release_name"
          rustc +srs -Vv
          cargo +srs -Vv

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.repository }}
          persist-credentials: false
          path: workload

      - name: Build ${{ matrix.name }}
        working-directory: workload
        run: |
          read -ra cargo_packages <<< "$CARGO_PACKAGES"
          cargo +srs build --locked "${cargo_packages[@]}"
