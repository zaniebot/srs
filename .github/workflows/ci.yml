name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  test-scripts:
    uses: ./.github/workflows/test-scripts.yml

  test-cargo:
    uses: ./.github/workflows/test-cargo.yml

  test-sld:
    uses: ./.github/workflows/test-sld.yml

  build-linux:
    name: "build-toolchain"
    uses: ./.github/workflows/build-toolchain.yml
    with:
      platform: linux
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      sha: ${{ github.sha }}

  build-macos:
    name: "build-toolchain"
    uses: ./.github/workflows/build-toolchain.yml
    with:
      platform: macos
      runner: macos-15
      target: aarch64-apple-darwin
      sha: ${{ github.sha }}

  test-installed-linux:
    name: "test-installed"
    needs: build-linux
    uses: ./.github/workflows/test-installed.yml
    with:
      platform: linux
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      sha: ${{ github.sha }}

  test-installed-macos:
    name: "test-installed"
    needs: build-macos
    uses: ./.github/workflows/test-installed.yml
    with:
      platform: macos
      runner: macos-15
      target: aarch64-apple-darwin
      sha: ${{ github.sha }}

  test-workloads-linux:
    name: "test-workloads"
    needs: build-linux
    uses: ./.github/workflows/test-workloads.yml
    with:
      platform: linux
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      sha: ${{ github.sha }}

  test-workloads-macos:
    name: "test-workloads"
    needs: build-macos
    uses: ./.github/workflows/test-workloads.yml
    with:
      platform: macos
      runner: macos-15
      target: aarch64-apple-darwin
      sha: ${{ github.sha }}

  required-checks-passed:
    name: "all required jobs passed"
    if: always()
    needs:
      - test-scripts
      - test-cargo
      - test-sld
      - build-linux
      - build-macos
      - test-installed-linux
      - test-installed-macos
      - test-workloads-linux
      - test-workloads-macos
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: "Check required jobs passed"
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          failures="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | "\(.key): \(.value.result)"
            ' <<< "$NEEDS"
          )"
          if [[ -n "$failures" ]]; then
            printf 'Required jobs did not succeed:\n%s\n' "$failures" >&2
            exit 1
          fi
