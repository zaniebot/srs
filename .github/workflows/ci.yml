name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  test-scripts:
    uses: ./.github/workflows/test-scripts.yml

  test-cargo:
    uses: ./.github/workflows/test-cargo.yml

  test-sld:
    uses: ./.github/workflows/test-sld.yml

  build-linux:
    uses: ./.github/workflows/build-toolchain.yml
    with:
      name: Linux x86_64
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      sha: ${{ github.sha }}

  build-macos:
    uses: ./.github/workflows/build-toolchain.yml
    with:
      name: macOS arm64
      runner: macos-15
      target: aarch64-apple-darwin
      sha: ${{ github.sha }}

  installed-tests-linux:
    needs: build-linux
    uses: ./.github/workflows/test-installed.yml
    with:
      name: Linux x86_64
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      sha: ${{ github.sha }}

  installed-tests-macos:
    needs: build-macos
    uses: ./.github/workflows/test-installed.yml
    with:
      name: macOS arm64
      runner: macos-15
      target: aarch64-apple-darwin
      sha: ${{ github.sha }}

  workloads-linux:
    needs: build-linux
    uses: ./.github/workflows/test-workloads.yml
    with:
      name: Linux x86_64
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      sha: ${{ github.sha }}

  workloads-macos:
    needs: build-macos
    uses: ./.github/workflows/test-workloads.yml
    with:
      name: macOS arm64
      runner: macos-15
      target: aarch64-apple-darwin
      sha: ${{ github.sha }}

  required-checks-passed:
    name: Required checks passed
    if: always()
    needs:
      - test-scripts
      - test-cargo
      - test-sld
      - build-linux
      - build-macos
      - installed-tests-linux
      - installed-tests-macos
      - workloads-linux
      - workloads-macos
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check required jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          failures="$(
            jq -r '
              to_entries[]
              | select(.value.result != "success")
              | "\(.key): \(.value.result)"
            ' <<< "$NEEDS"
          )"
          if [[ -n "$failures" ]]; then
            printf 'Required jobs did not succeed:\n%s\n' "$failures" >&2
            exit 1
          fi
