name: Release

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      commit: ${{ steps.release.outputs.commit }}
      tag: ${{ steps.release.outputs.tag }}
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Select release
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            printf 'release workflow must be dispatched from main, got %s\n' "$GITHUB_REF" >&2
            exit 2
          fi

          run_created_at="$(
            gh api "repos/$GH_REPO/actions/runs/$GITHUB_RUN_ID" --jq .created_at
          )"
          release_date="${run_created_at%%T*}"
          release_tag="${release_date//-/.}"
          if [[ ! "$release_tag" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            printf 'workflow run has unexpected creation time %s\n' "$run_created_at" >&2
            exit 2
          fi

          printf 'commit=%s\n' "$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$release_tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build release (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
    env:
      CARGO_INCREMENTAL: 0
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      SRS_SLD_PROFILE: dist

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false
          ref: ${{ needs.prepare.outputs.commit }}
          submodules: recursive

      - name: Verify release packaging
        run: |
          ./scripts/test-install-snapshot.sh
          ./scripts/test-cargo-srs-wrapper.sh

      - name: Build SRS
        run: |
          ./build.sh \
            --ci false \
            --set=rust.incremental=false \
            --set=rust.debuginfo-level=0 \
            --set="build.description=srs-$RELEASE_TAG"

      - name: Package release
        shell: bash
        run: |
          set -euo pipefail
          release_name="srs-${RELEASE_TAG}-${{ matrix.target }}"
          install_root="$RUNNER_TEMP/srs-release"
          snapshot="$install_root/$release_name"

          SRS_INSTALL_ROOT="$install_root" ./install.sh "$release_name"

          rustc_version="$(rustc +"$release_name" -Vv)"
          printf '%s\n' "$rustc_version"
          grep -Fq "srs-$RELEASE_TAG" <<< "$rustc_version"
          cargo +"$release_name" -Vv
          host="$(rustc +"$release_name" --print host-tuple)"
          if [[ "$host" != "${{ matrix.target }}" ]]; then
            printf 'built host %s does not match release target %s\n' \
              "$host" "${{ matrix.target }}" >&2
            exit 2
          fi
          test -x "$snapshot/bin/cargo-clippy"
          test -x "$snapshot/bin/clippy-driver"
          test -x "$snapshot/lib/rustlib/$host/bin/sld"
          "$snapshot/bin/cargo-clippy" -V
          "$snapshot/bin/clippy-driver" -V
          "$snapshot/lib/rustlib/$host/bin/sld" --version

          mkdir -p dist
          COPYFILE_DISABLE=1 tar \
            -C "$install_root" \
            -czf "dist/$release_name.tar.gz" \
            "$release_name"
          (
            cd dist
            shasum -a 256 "$release_name.tar.gz" > "$release_name.tar.gz.sha256"
          )

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0
          overwrite: true
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_COMMIT: ${{ needs.prepare.outputs.commit }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Verify release archives
        run: |
          set -euo pipefail
          cd dist
          sha256sum --check ./*.sha256

      - name: Publish release
        shell: bash
        run: |
          set -euo pipefail
          files=(dist/*.tar.gz dist/*.sha256)

          if ! gh api \
            --method POST \
            "repos/$GH_REPO/git/refs" \
            -f ref="refs/tags/$RELEASE_TAG" \
            -f sha="$RELEASE_COMMIT" \
            > /dev/null
          then
            printf 'release tag %s already exists or could not be created\n' \
              "$RELEASE_TAG" >&2
            exit 2
          fi

          gh release create "$RELEASE_TAG" "${files[@]}" \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "$RELEASE_TAG"
          gh release edit "$RELEASE_TAG" --draft=false
