on:
  workflow_call:

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: '-D warnings'

jobs:
  test-nightly:
    name: cargo test on linux ${{ contains(matrix.runs-on, 'arm') && 'aarch64' || 'x86_64' }} (${{ matrix.container }}${{ matrix.test-qemu && ', qemu' || ''}})

    strategy:
      matrix:
        runs-on:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        container:
          - 'ubuntu:24.04'
          - 'opensuse/tumbleweed:latest' # zizmor: ignore[unpinned-images]
          - 'rust:1.94-alpine'
        test-qemu:
          - false
        test-plugins:
          - false
        include:
          - runs-on: ubuntu-24.04
            container: 'ubuntu:25.10'
            test-qemu: true
          - runs-on: ubuntu-24.04-arm
            container: 'ubuntu:25.10'
            test-qemu: false
            test-plugins: true
          - runs-on: ubuntu-24.04
            container: 'ubuntu:26.04'
            test-qemu: true
          - runs-on: ubuntu-24.04-arm
            container: 'ubuntu:26.04'
            test-qemu: false
        exclude: # TODO: https://github.com/actions/runner/issues/1637
          - runs-on: ubuntu-24.04-arm
            container: 'rust:1.94-alpine'
      fail-fast: false

    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 10

    container:
      image: ${{ matrix.container }}

    steps:
      - run: echo "SLD_TEST_CONFIG=test-config-ci.toml" >> $GITHUB_ENV
      - run: echo "SLD_TEST_CROSS=all" >> $GITHUB_ENV
        if: ${{ matrix.test-qemu }}
      - run: apt-get update && apt-get -y install gcc g++ clang clang-format lld curl bubblewrap
        if: ${{ contains(matrix.container, 'ubuntu') }}
      - run: apt-get update && apt-get -y install qemu-user gcc-aarch64-linux-gnu g++-aarch64-linux-gnu gcc-riscv64-linux-gnu g++-riscv64-linux-gnu gcc-loongarch64-linux-gnu g++-loongarch64-linux-gnu binutils-aarch64-linux-gnu binutils-riscv64-linux-gnu binutils-loongarch64-linux-gnu
        if: ${{ matrix.test-qemu }}
      - run: zypper refresh && zypper in -y gcc gcc-c++ glibc-devel-static clang lld curl rustup bubblewrap
        if: ${{ contains(matrix.container, 'opensuse') }}
      - run: apk add build-base lld clang clang-extra-tools bash curl tar
        if: ${{ contains(matrix.container, 'alpine') }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Install Rustup"
        if: ${{ !contains(matrix.container, 'opensuse') }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: "Install Rust toolchain"
        run: |
          rustup toolchain install nightly --profile minimal --component rustc-codegen-cranelift-preview --no-self-update
          rustup target add --toolchain nightly \
            x86_64-unknown-linux-gnu \
            x86_64-unknown-linux-musl \
            aarch64-unknown-linux-gnu \
            aarch64-unknown-linux-musl \
            riscv64gc-unknown-linux-gnu \
            riscv64gc-unknown-linux-musl \
            loongarch64-unknown-linux-gnu \
            loongarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ runner.os }}-${{ matrix.container }}-${{ matrix.runs-on }}
      - run: cargo +nightly build --profile ci --workspace --no-default-features
      - run: cargo +nightly test --profile ci --features plugins
        if: ${{ matrix.test-plugins }}
      - run: SLD_TEST_CROSS=$SLD_TEST_CROSS cargo +nightly test --profile ci --workspace

  macho-build:
    name: "cargo test on macos aarch64"
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: "Install Rust toolchain"
        run: rustup toolchain install stable --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo +stable build --profile ci --workspace --no-default-features
      - run: cargo +stable test --profile ci --workspace
