on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      runner:
        required: true
        type: string
      target:
        required: true
        type: string
      sha:
        required: true
        type: string

permissions: {}

jobs:
  checksum-composition:
    name: "checksum composition on ${{ inputs.platform }}"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    env:
      CARGO_INCREMENTAL: 0
      SRS_CI_TARGET: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Download installed SRS snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: srs-toolchain-${{ inputs.target }}-${{ inputs.sha }}
          path: ${{ runner.temp }}/srs-artifact

      - name: Link installed SRS snapshot
        run: |
          release_name="srs-ci-$SRS_CI_TARGET"
          install_root="$RUNNER_TEMP/srs-toolchains"
          mkdir -p "$install_root"
          tar -C "$install_root" \
            -xzf "$RUNNER_TEMP/srs-artifact/$release_name.tar.gz"
          rustup toolchain link srs "$install_root/$release_name"
          rustc +srs -Vv
          cargo +srs -Vv

      - name: Verify checksum freshness artifact cache composition
        run: |
          case "$RUNNER_OS" in
            Linux) export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=cc ;;
            macOS) export CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER=/usr/bin/clang ;;
          esac
          export SLD_INCREMENTAL=0
          cargo +srs test --manifest-path rust/src/tools/cargo/Cargo.toml --test testsuite \
            artifact_cache::checksum_freshness_same_mtime_edit_does_not_restore_stale_artifact -- --exact
          cargo +srs test --manifest-path rust/src/tools/cargo/Cargo.toml --test testsuite \
            artifact_cache::same_mtime_input_changed_after_compilation_is_not_published -- --exact
          cargo +srs test --manifest-path rust/src/tools/cargo/Cargo.toml --test testsuite \
            artifact_cache::same_mtime_input_changed_during_publication_is_not_published -- --exact

  smoke:
    name: "smoke on ${{ inputs.platform }}"
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    env:
      CARGO_INCREMENTAL: 0
      SRS_CI_TARGET: ${{ inputs.target }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Download installed SRS snapshot
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: srs-toolchain-${{ inputs.target }}-${{ inputs.sha }}
          path: ${{ runner.temp }}/srs-artifact

      - name: Link installed SRS snapshot
        run: |
          release_name="srs-ci-$SRS_CI_TARGET"
          install_root="$RUNNER_TEMP/srs-toolchains"
          mkdir -p "$install_root"
          tar -C "$install_root" \
            -xzf "$RUNNER_TEMP/srs-artifact/$release_name.tar.gz"
          rustup toolchain link srs "$install_root/$release_name"
          rustc +srs -Vv
          cargo +srs -Vv

      - name: Verify SRS default backend
        run: |
          rustc +srs -Z unstable-options --print target-spec-json \
            | grep -q '"default-codegen-backend": "cranelift"'

      - name: Verify Cranelift panic unwinding
        if: runner.os == 'Linux'
        run: |
          cat > "$RUNNER_TEMP/catch-unwind.rs" <<'EOF'
          fn main() {
              std::panic::set_hook(Box::new(|_| {}));
              assert!(std::panic::catch_unwind(|| panic!("expected panic")).is_err());
          }
          EOF
          rustc +srs -C panic=unwind \
            "$RUNNER_TEMP/catch-unwind.rs" \
            -o "$RUNNER_TEMP/catch-unwind"
          "$RUNNER_TEMP/catch-unwind"

      - name: Verify cargo +srs installed dependency-edit replay
        run: ./scripts/test-cargo-srs-native-incremental.sh
