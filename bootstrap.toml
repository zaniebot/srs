change-id = 999999
profile = "compiler"

[build]
extended = true
tools = ["cargo"]

[llvm]
download-ci-llvm = true

[rust]
channel = "dev"
codegen-backends = ["llvm", "cranelift"]
deny-warnings = false

[target.aarch64-apple-darwin]
linker = "cc"
default-linker = "sld"
rustflags = ["-Zcodegen-backend=llvm"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-Zcodegen-backend=llvm"]
